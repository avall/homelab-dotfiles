# ---- Monitor ----------------------------------------------------------------
monitor = ,preferred,auto,1

# ---- Autostart --------------------------------------------------------------
exec-once = waybar
exec-once = hyprpaper
exec-once = gammastep -O 4000
exec-once = cliphist
exec-once = alacritty --class quake-alacritty

# ---- Input ------------------------------------------------------------------
input {
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0
}

# ---- General (yabai layout + borders equivalent) ----------------------------
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 5
    col.active_border = rgba(ff9300ff)
    col.inactive_border = rgba(414550ff)
    layout = dwindle
    allow_tearing = false
}

# ---- Decoration (borders style=round equivalent) ----------------------------
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.1696
    }
    drop_shadow = true
    shadow_range = 8
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

# ---- Animations -------------------------------------------------------------
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ---- Layout (yabai bsp equivalent) -----------------------------------------
dwindle {
    pseudotile = false
    preserve_split = true
    split_ratio = 0.6
}

master {
    new_is_master = false
}

# ---- Misc -------------------------------------------------------------------
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ---- Window Rules (yabai manage=off equivalent) -----------------------------
windowrule = float, class:^(gnome-calculator)$
windowrule = float, class:^(org.kde.kdiff3)$
windowrule = float, class:^(zoom)$

# ---- Quake terminal (hammerspoon Alt+D/A equivalent) ------------------------
# Pre-spawn alacritty in special workspace on startup (exec-once above)
windowrule = workspace special:quake silent, class:^(quake-alacritty)$
windowrule = size 100% 50%, class:^(quake-alacritty)$
windowrule = move 0 0, class:^(quake-alacritty)$
windowrule = animation popin, class:^(quake-alacritty)$

# ---- Keybindings ------------------------------------------------------------
$mod = SUPER

# Quake terminal toggle — Alt+D / Alt+A (hammerspoon equivalent)
bind = ALT, D, togglespecialworkspace, quake
bind = ALT, A, togglespecialworkspace, quake

# WezTerm — Alt+E (hammerspoon equivalent)
bind = ALT, E, exec, wezterm

# IntelliJ IDEA — Alt+I (hammerspoon equivalent)
bind = ALT, I, exec, idea-ultimate

# skhd equivalents (Ctrl+Cmd → Ctrl+Super on Linux)
bind = CTRL SUPER, A, exec, alacritty
bind = CTRL SUPER, C, exec, code
bind = CTRL SUPER, I, exec, idea-ultimate
bind = CTRL SUPER, B, exec, google-chrome-stable

# Window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit

# Move focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize windows
binde = $mod ALT, right, resizeactive, 50 0
binde = $mod ALT, left, resizeactive, -50 0
binde = $mod ALT, up, resizeactive, 0 -50
binde = $mod ALT, down, resizeactive, 0 50

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Mouse bindings (yabai mouse_modifier ctrl equivalent)
bindm = CTRL, mouse:272, movewindow
bindm = CTRL, mouse:273, resizewindow

# App launcher (raycast equivalent)
bind = $mod, R, exec, wofi --show drun

# Screenshot (flameshot equivalent)
bind = , Print, exec, hyprshot -m output
bind = SHIFT, Print, exec, hyprshot -m region
