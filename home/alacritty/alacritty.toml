
[general]
live_config_reload = true
import = ["~/.config/alacritty/colors.toml", "~/.config/alacritty/keybindings.toml"]

[env]
TERM = "xterm-256color"

[bell]
animation = "EaseOutExpo"
color = "#ffffff"
duration = 300

[cursor]
style = { shape = "Block", blinking = "Always" }
unfocused_hollow = true

[font]
size = 12.8

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.bold_italic]
family = "MesloLGS Nerd Font"
style = "Bold Italic"

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"

[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"




[debug]
persistent_logging = false
log_level = "Off"

[scrolling]
history = 100000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window]
decorations = "full"
dynamic_padding = false
dynamic_title = true
opacity = 0.9


[window.dimensions]
columns = 120
lines = 30

[window.padding]
x = 25
y = 20


[[hints.enabled]]
binding = { key = "U", mods = "Control|Shift" }
command = { program = "sh", args = ["-c", "xdg-open \"$0\" 2>/dev/null || open \"$0\" 2>/dev/null"] }
hyperlinks = true
mouse.enabled = true
post_processing = true
persist = false
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩‘]+"
